<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CabPass - Dispatch</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <header class="bg-yellow-500 p-4 text-white text-center shadow-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold">CabPass</h1>
        <p class="text-xs opacity-90">Job Sharing & Billing</p>
    </header>

    <nav class="flex bg-white border-b sticky top-[72px] z-40">
        <button onclick="showTab('jobs')" id="tab-jobs" class="flex-1 p-4 text-blue-600 font-bold border-b-2 border-blue-600">Jobs</button>
        <button onclick="showTab('drivers')" id="tab-drivers" class="flex-1 p-4 text-gray-500">Drivers</button>
        <button onclick="showTab('customers')" id="tab-customers" class="flex-1 p-4 text-gray-500">Customers</button>
    </nav>

    <main class="p-4">
        <div id="section-jobs" class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Active Jobs</h2>
                <button onclick="toggleModal('job-modal')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold">+ New Job</button>
            </div>
            <div id="job-list" class="space-y-3"></div>
        </div>

        <div id="section-drivers" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">My Drivers</h2>
                <button onclick="toggleModal('driver-modal')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ Add Driver</button>
            </div>
            <div id="driver-list" class="space-y-3"></div>
        </div>

        <div id="section-customers" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Customers</h2>
                <button onclick="toggleModal('customer-modal')" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-bold">+ Add Customer</button>
            </div>
            <div id="customer-list" class="space-y-3"></div>
        </div>
    </main>

    <div id="job-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Create New Job</h3>
            <div class="space-y-3">
                <input id="j-pickup" type="text" placeholder="Pickup Location" class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="j-drop" type="text" placeholder="Drop Location" class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="j-tariff" type="number" placeholder="Tariff (₹)" class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="j-time" type="datetime-local" class="w-full border p-3 rounded-lg bg-gray-50">
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="handleSaveJob()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">Post & Share</button>
                <button onclick="toggleModal('job-modal')" class="flex-1 bg-gray-100 py-3 rounded-lg">Cancel</button>
            </div>
        </div>
    </div>

    <div id="driver-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-blue-700">Driver Details</h3>
            <div class="space-y-2">
                <input id="d-name" type="text" placeholder="Driver Name" class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="d-car" type="text" placeholder="Car Model (Swift, Desire, etc)" class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="d-reg" type="text" placeholder="Car Reg No." class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="d-color" type="text" placeholder="Car Color" class="w-full border p-3 rounded-lg bg-gray-50">
                <input id="d-phone" type="tel" placeholder="Mobile Number" class="w-full border p-3 rounded-lg bg-gray-50">
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="handleSaveDriver()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold">Save Driver</button>
                <button onclick="toggleModal('driver-modal')" class="flex-1 bg-gray-100 py-3 rounded-lg">Cancel</button>
            </div>
        </div>
    </div>

    <div id="customer-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-purple-700">Customer Details</h3>
            <div class="space-y-2">
                <input id="c-name" type="text" placeholder="Customer Name" class="w-full border p-3 rounded-lg bg-gray-50">
                <textarea id="c-address" placeholder="Address/Location" class="w-full border p-3 rounded-lg bg-gray-50"></textarea>
                <input id="c-phone" type="tel" placeholder="Customer Phone" class="w-full border p-3 rounded-lg bg-gray-50">
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="handleSaveCustomer()" class="flex-1 bg-purple-600 text-white py-3 rounded-lg font-bold">Save Customer</button>
                <button onclick="toggleModal('customer-modal')" class="flex-1 bg-gray-100 py-3 rounded-lg">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
